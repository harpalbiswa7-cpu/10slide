<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Animation</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: sans-serif;
    }

    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
background: #833AB4;
background: linear-gradient(90deg, rgba(131, 58, 180, 1) 0%, rgba(253, 29, 29, 1) 50%, rgba(252, 176, 69, 1) 100%);
    h1{
        font-size: 100px;
        font-weight: 400;
        -webkit-text-stroke: 3px rgb(232, 223, 222);
        color: transparent;
        position: relative;
        cursor: pointer;
    }
    h1::before{
        content: "Designed By Biswajit Harpal";
        position: absolute;
        height: 100%;
        width: 0%;
        color:rgb(236, 230, 230);
        border-right: 0px solid rgb(18, 233, 97);
        overflow: hidden;
        transition: width 1.3s;
    }
    h1:hover::before{
        width: 100%;
        border-right: 2px solid;
    }
</style>
<body>
    <h1>Designed By Biswajit Harpal</h1>
</body>
</html>
